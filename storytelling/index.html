<!DOCTYPE html>
<html>

<head>
    <meta charset='utf-8' />
    <title>🧬 Münchens DNA in Straßennamen</title>
    <meta name='viewport' content='initial-scale=1,maximum-scale=1,user-scalable=no' />
    <script src='https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js'></script>
    <link href='https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css' rel='stylesheet' />
    <script src="https://unpkg.com/scrollama@3.2.0/build/scrollama.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: sans-serif;
        }

        a,
        a:hover,
        a:visited {
            color: #0071bc;
        }

        #map {
            top: 0;
            height: 100vh;
            width: 100vw;
            position: fixed;
        }

        #header {
            margin: auto;
            width: 100%;
            position: relative;
            z-index: 5;
        }

        #header h1,
        #header h2,
        #header p {
            margin: 0;
            padding: 2vh 2vw;
            text-align: center;
        }

        #footer {
            width: 100%;
            min-height: 5vh;
            padding-top: 2vh;
            padding-bottom: 2vh;
            text-align: center;
            line-height: 25px;
            font-size: 13px;
            position: relative;
            z-index: 5;
        }

        #features {
            padding-top: 10vh;
            padding-bottom: 10vh;
        }

        .hidden {
            visibility: hidden;
        }

        .centered {
            width: 50vw;
            margin: 0 auto;
        }

        .lefty {
            width: 33vw;
            margin-left: 5vw;
        }

        .righty {
            width: 33vw;
            margin-left: 62vw;
        }

        .fully {
            width: 100%;
            margin: auto;
        }

        .light {
            color: #444;
            background-color: #fafafa;
        }

        .dark {
            color: #444;
            background-color: #87ceeb;
        }

        .step {
            padding-bottom: 50vh;
            opacity: 0.25;
        }

        .step.active {
            opacity: 0.9;
        }

        .step div {
            padding: 25px 50px;
            line-height: 25px;
            font-size: 14px;
            text-align: justify;
        }

        .step img {
            width: 100%;
        }

        @media (max-width: 750px) {

            .centered,
            .lefty,
            .righty,
            .fully {
                width: 90vw;
                margin: 0 auto;
            }
        }

        /* Fix touch scrolling on mobile */
        .maplibregl-canvas-container.maplibregl-touch-zoom-rotate.maplibregl-touch-drag-pan,
        .maplibregl-canvas-container.maplibregl-touch-zoom-rotate.maplibregl-touch-drag-pan .maplibregl-canvas {
            touch-action: unset;
        }
    </style>
</head>

<body>

    <div id="map"></div>
    <div id="story"></div>

    <script src="./config.js"></script>
    <script>
        var layerTypes = {
            'fill': ['fill-opacity'],
            'line': ['line-opacity'],
            'circle': ['circle-opacity', 'circle-stroke-opacity'],
            'symbol': ['icon-opacity', 'text-opacity'],
            'raster': ['raster-opacity'],
            'fill-extrusion': ['fill-extrusion-opacity'],
            'heatmap': ['heatmap-opacity']
        };

        var alignments = {
            'left': 'lefty',
            'center': 'centered',
            'right': 'righty',
            'full': 'fully'
        };

        function getLayerPaintType(layer) {
            return layerTypes[map.getLayer(layer).type];
        }

        function setLayerOpacity(layer) {
            var paintProps = getLayerPaintType(layer.layer);
            paintProps.forEach(function (prop) {
                if (layer.duration) {
                    map.setPaintProperty(layer.layer, prop + '-transition', { duration: layer.duration });
                }
                map.setPaintProperty(layer.layer, prop, layer.opacity);
            });
        }

        // Build story DOM
        var story = document.getElementById('story');
        var features = document.createElement('div');
        features.setAttribute('id', 'features');

        var header = document.createElement('div');

        if (config.title) {
            var titleText = document.createElement('h1');
            titleText.innerText = config.title;
            header.appendChild(titleText);
        }

        if (config.subtitle) {
            var subtitleText = document.createElement('h2');
            subtitleText.innerText = config.subtitle;
            header.appendChild(subtitleText);
        }

        if (config.byline) {
            var bylineText = document.createElement('p');
            bylineText.innerText = config.byline;
            header.appendChild(bylineText);
        }

        if (header.innerText.length > 0) {
            header.classList.add(config.theme);
            header.setAttribute('id', 'header');
            story.appendChild(header);
        }

        config.chapters.forEach((record, idx) => {
            var container = document.createElement('div');
            var chapter = document.createElement('div');

            if (record.title) {
                var title = document.createElement('h3');
                title.innerText = record.title;
                chapter.appendChild(title);
            }

            if (record.image) {
                var image = new Image();
                image.src = record.image;
                chapter.appendChild(image);
            }

            if (record.description) {
                var desc = document.createElement('p');
                desc.innerHTML = record.description;
                chapter.appendChild(desc);
            }

            container.setAttribute('id', record.id);
            container.classList.add('step');
            if (idx === 0) container.classList.add('active');

            chapter.classList.add(config.theme);
            container.appendChild(chapter);
            container.classList.add(alignments[record.alignment] || 'centered');
            if (record.hidden) container.classList.add('hidden');
            features.appendChild(container);
        });

        story.appendChild(features);

        var footer = document.createElement('div');

        if (config.footer) {
            var footerText = document.createElement('p');
            footerText.innerHTML = config.footer;
            footer.appendChild(footerText);
        }

        if (footer.innerText.length > 0) {
            footer.classList.add(config.theme);
            footer.setAttribute('id', 'footer');
            story.appendChild(footer);
        }

        var map = new maplibregl.Map({
            container: 'map',
            style: config.style,
            center: config.chapters[0].location.center,
            zoom: config.chapters[0].location.zoom,
            bearing: config.chapters[0].location.bearing,
            pitch: config.chapters[0].location.pitch,
            interactive: false
        });

        if (config.showMarkers) {
            var marker = new maplibregl.Marker({ color: config.markerColor });
            marker.setLngLat(config.chapters[0].location.center).addTo(map);
        }

        var scroller = scrollama();

        map.on('load', function () {
            // Satellite raster overlay (Esri World Imagery, free for display use)
            map.addSource('satellite', {
                type: 'raster',
                tiles: ['https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}'],
                tileSize: 256,
                attribution: 'Tiles &copy; Esri &mdash; Source: Esri, i-cubed, USDA, USGS, AEX, GeoEye, Getmapping, Aerogrid, IGN, IGP, UPR-EGP, and the GIS User Community'
            });
            // Layer id kept as 'mapbox-satellite' to avoid changing config.js chapter references
            map.addLayer({
                id: 'mapbox-satellite',
                type: 'raster',
                source: 'satellite',
                paint: { 'raster-opacity': 0 }
            });

            // Local GeoJSON street data
            map.addSource('strassen', {
                type: 'geojson',
                data: '../processed_data/strassen_adressen_muenchen_wgs84.geojson'
            });

            // Highlight layers — all start invisible, toggled by chapter enter/exit.
            // Field names from the GeoJSON: STRANAM (street name), HSZ (address count).
            var streetLayers = [
                {
                    id: 'schleissheimer-str',
                    filter: ['==', ['get', 'STRANAM'], 'Schleißheimer Str.'],
                    color: '#e74c3c'
                },
                {
                    id: 'dachauer-str',
                    filter: ['==', ['get', 'STRANAM'], 'Dachauer Str.'],
                    color: '#e74c3c'
                },
                {
                    id: 'ladsberger-str', // original id kept (typo preserved) to match config.js
                    filter: ['==', ['get', 'STRANAM'], 'Landsberger Str.'],
                    color: '#e74c3c'
                },
                {
                    id: 'dorfstr',
                    filter: ['==', ['get', 'STRANAM'], 'Dorfstraße'],
                    color: '#e74c3c'
                },
                {
                    id: 'geister-strassen',
                    filter: ['==', ['get', 'HSZ'], 0],
                    color: '#95a5a6'
                },
                {
                    id: 'platz-der-opfer-des-nationalsozialismus',
                    filter: ['==', ['get', 'STRANAM'], 'Platz der Opfer des Nationalsozialismus'],
                    color: '#f39c12'
                },
                {
                    // TODO: Replace the filter with the official 2021 city archive list of
                    // 45 street names with "erhöhtem Diskussionsbedarf" once data is available.
                    id: 'strassennamen-mit-erhoehtem-diskussionsbedarf',
                    filter: ['boolean', false],
                    color: '#8e44ad'
                }
            ];

            streetLayers.forEach(function (l) {
                map.addLayer({
                    id: l.id,
                    type: 'line',
                    source: 'strassen',
                    filter: l.filter,
                    paint: {
                        'line-color': l.color,
                        'line-width': 4,
                        'line-opacity': 0
                    }
                });
            });

            scroller
                .setup({
                    step: '.step',
                    offset: 0.5,
                    progress: true
                })
                .onStepEnter(response => {
                    var current_chapter = config.chapters.findIndex(chap => chap.id === response.element.id);
                    var chapter = config.chapters[current_chapter];

                    response.element.classList.add('active');
                    map[chapter.mapAnimation || 'flyTo'](chapter.location);

                    if (config.showMarkers) marker.setLngLat(chapter.location.center);
                    if (chapter.onChapterEnter.length > 0) chapter.onChapterEnter.forEach(setLayerOpacity);
                    if (chapter.callback) window[chapter.callback]();
                    if (chapter.rotateAnimation) {
                        map.once('moveend', () => {
                            const rotateNumber = map.getBearing();
                            map.rotateTo(rotateNumber + 180, {
                                duration: 30000,
                                easing: t => t
                            });
                        });
                    }
                    if (config.auto) {
                        var next_chapter = (current_chapter + 1) % config.chapters.length;
                        map.once('moveend', () => {
                            document.querySelectorAll('[data-scrollama-index="' + next_chapter + '"]')[0].scrollIntoView();
                        });
                    }
                })
                .onStepExit(response => {
                    var chapter = config.chapters.find(chap => chap.id === response.element.id);
                    response.element.classList.remove('active');
                    if (chapter.onChapterExit.length > 0) chapter.onChapterExit.forEach(setLayerOpacity);
                });

            if (config.auto) {
                document.querySelectorAll('[data-scrollama-index="0"]')[0].scrollIntoView();
            }
        });
    </script>

</body>

</html>
