<!DOCTYPE html>
<html>

<head>
    <meta charset='utf-8' />
    <title>🧬 Berlins DNA in Straßennamen</title>
    <meta name='viewport' content='initial-scale=1,maximum-scale=1,user-scalable=no' />
    <script src='https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js'></script>
    <link href='https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css' rel='stylesheet' />
    <script src="https://unpkg.com/scrollama@3.2.0/build/scrollama.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: sans-serif;
        }

        a,
        a:hover,
        a:visited {
            color: #0071bc;
        }

        #map {
            top: 0;
            height: 100vh;
            width: 100vw;
            position: fixed;
        }

        #header {
            margin: auto;
            width: 100%;
            position: relative;
            z-index: 5;
        }

        #header h1,
        #header h2,
        #header p {
            margin: 0;
            padding: 2vh 2vw;
            text-align: center;
        }

        #footer {
            width: 100%;
            min-height: 5vh;
            padding-top: 2vh;
            padding-bottom: 2vh;
            text-align: center;
            line-height: 25px;
            font-size: 13px;
            position: relative;
            z-index: 5;
        }

        #features {
            padding-top: 10vh;
            padding-bottom: 10vh;
        }

        .hidden {
            visibility: hidden;
        }

        .centered {
            width: 50vw;
            margin: 0 auto;
        }

        .lefty {
            width: 33vw;
            margin-left: 5vw;
        }

        .righty {
            width: 33vw;
            margin-left: 62vw;
        }

        .fully {
            width: 100%;
            margin: auto;
        }

        .light {
            color: #444;
            background-color: #fafafa;
        }

        .dark {
            color: #444;
            background-color: #87ceeb;
        }

        .step {
            padding-bottom: 50vh;
            opacity: 0.25;
        }

        .step.active {
            opacity: 0.9;
        }

        .step div {
            padding: 25px 50px;
            line-height: 25px;
            font-size: 14px;
            text-align: justify;
        }

        .step img {
            width: 100%;
        }

        @media (max-width: 750px) {

            .centered,
            .lefty,
            .righty,
            .fully {
                width: 90vw;
                margin: 0 auto;
            }
        }

        /* Fix touch scrolling on mobile */
        .maplibregl-canvas-container.maplibregl-touch-zoom-rotate.maplibregl-touch-drag-pan,
        .maplibregl-canvas-container.maplibregl-touch-zoom-rotate.maplibregl-touch-drag-pan .maplibregl-canvas {
            touch-action: unset;
        }
    </style>
</head>

<body>

    <div id="map"></div>
    <div id="story"></div>

    <script src="./config.js"></script>
    <script>
        var layerTypes = {
            'fill': ['fill-opacity'],
            'line': ['line-opacity'],
            'circle': ['circle-opacity', 'circle-stroke-opacity'],
            'symbol': ['icon-opacity', 'text-opacity'],
            'raster': ['raster-opacity'],
            'fill-extrusion': ['fill-extrusion-opacity'],
            'heatmap': ['heatmap-opacity']
        };

        var alignments = {
            'left': 'lefty',
            'center': 'centered',
            'right': 'righty',
            'full': 'fully'
        };

        var basemapRoadCaseLayerIds = [
            'road_service_case', 'road_minor_case', 'road_sec_case_noramp', 'road_pri_case_ramp',
            'road_pri_case_noramp', 'road_trunk_case_ramp', 'road_trunk_case_noramp',
            'road_mot_case_ramp', 'road_mot_case_noramp', 'bridge_service_case',
            'bridge_minor_case', 'bridge_sec_case', 'bridge_pri_case',
            'bridge_trunk_case', 'bridge_mot_case'
        ];

        var basemapRoadFillLayerIds = [
            'road_service_fill', 'road_minor_fill', 'road_sec_fill_noramp', 'road_pri_fill_ramp',
            'road_pri_fill_noramp', 'road_trunk_fill_ramp', 'road_trunk_fill_noramp',
            'road_mot_fill_ramp', 'road_mot_fill_noramp', 'bridge_service_fill',
            'bridge_minor_fill', 'bridge_sec_fill', 'bridge_pri_fill',
            'bridge_trunk_fill', 'bridge_mot_fill'
        ];

        var streetHighlightColors = {};
        var streetGlowLayerIds = {};

        function getLayerPaintType(layer) {
            return layerTypes[map.getLayer(layer).type];
        }

        function setLayerOpacity(layer) {
            var mapLayer = map.getLayer(layer.layer);
            var layerType = mapLayer.type;

            if (layerType === 'line' && streetHighlightColors[layer.layer]) {
                var highlightColor = layer.color || (layer.opacity > 0 ? streetHighlightColors[layer.layer] : '#ffffff');
                var highlightOpacity = layer.highlightOpacity != null
                    ? layer.highlightOpacity
                    : (layer.opacity > 0 ? Math.min(layer.opacity, 0.82) : layer.opacity);
                var highlightWidth = layer.highlightWidth != null
                    ? layer.highlightWidth
                    : (layer.opacity > 0 ? 6 : 4);
                var opacityDuration = layer.opacity > 0 ? 700 : 500;
                var glowLayerId = streetGlowLayerIds[layer.layer];

                if (layer.duration) {
                    map.setPaintProperty(layer.layer, 'line-color-transition', { duration: layer.duration });
                    map.setPaintProperty(layer.layer, 'line-opacity-transition', { duration: opacityDuration });
                    map.setPaintProperty(layer.layer, 'line-width-transition', { duration: 650 });
                    if (glowLayerId) {
                        map.setPaintProperty(glowLayerId, 'line-opacity-transition', { duration: 450 });
                    }
                }

                if (glowLayerId) {
                    map.setPaintProperty(glowLayerId, 'line-color', highlightColor);
                    map.setPaintProperty(glowLayerId, 'line-opacity', layer.opacity > 0 ? 0.22 : 0);
                }
                map.setPaintProperty(layer.layer, 'line-color', highlightColor);
                map.setPaintProperty(layer.layer, 'line-opacity', highlightOpacity);
                map.setPaintProperty(layer.layer, 'line-width', highlightWidth);
                return;
            }

            var paintProps = layerTypes[layerType];
            paintProps.forEach(function (prop) {
                if (layer.duration) {
                    map.setPaintProperty(layer.layer, prop + '-transition', { duration: layer.duration });
                }
                map.setPaintProperty(layer.layer, prop, layer.opacity);
            });
        }

        function setPaintIfLayerExists(layerId, prop, value) {
            if (map.getLayer(layerId)) {
                try {
                    map.setPaintProperty(layerId, prop, value);
                } catch (err) {
                    // Ignore unsupported paint properties on third-party basemap layers.
                }
            }
        }

        function setBasemapRoadPalette(caseColor, fillColor, transitionDuration) {
            basemapRoadCaseLayerIds.forEach(function (id) {
                setPaintIfLayerExists(id, 'line-color-transition', { duration: transitionDuration });
                setPaintIfLayerExists(id, 'line-color', caseColor);
            });

            basemapRoadFillLayerIds.forEach(function (id) {
                setPaintIfLayerExists(id, 'line-color-transition', { duration: transitionDuration });
                setPaintIfLayerExists(id, 'line-color', fillColor);
            });
        }

        function setBasemapRoadOpacity(opacity, transitionDuration) {
            basemapRoadCaseLayerIds.concat(basemapRoadFillLayerIds).forEach(function (id) {
                setPaintIfLayerExists(id, 'line-opacity-transition', { duration: transitionDuration });
                setPaintIfLayerExists(id, 'line-opacity', opacity);
            });
        }

        function tuneBasemap() {
            ['landcover', 'park_national_park', 'park_nature_reserve', 'landuse'].forEach(function (id) {
                setPaintIfLayerExists(id, 'fill-color', '#181818');
            });
            setPaintIfLayerExists('background', 'background-color', '#181818');
            setPaintIfLayerExists('landuse_residential', 'fill-color', 'rgba(40, 40, 40, 0.28)');
            setPaintIfLayerExists('water', 'fill-color', '#3a4650');
            setPaintIfLayerExists('waterway', 'line-color', '#516675');
            setBasemapRoadPalette('#2c2c2c', '#4a4a4a', 0);
        }

        function setIntroRoadPalette(active) {
            if (active) {
                setBasemapRoadOpacity(0, 700);
            } else {
                setBasemapRoadOpacity(1, 500);
                setBasemapRoadPalette('#2c2c2c', '#4a4a4a', 500);
            }
        }

        function activateIntroEffects() {
            setIntroRoadPalette(true);
        }

        function deactivateIntroEffects() {
            setIntroRoadPalette(false);
        }

        // Build story DOM
        var story = document.getElementById('story');
        var features = document.createElement('div');
        features.setAttribute('id', 'features');

        var header = document.createElement('div');

        if (config.title) {
            var titleText = document.createElement('h1');
            titleText.innerText = config.title;
            header.appendChild(titleText);
        }

        if (config.subtitle) {
            var subtitleText = document.createElement('h2');
            subtitleText.innerText = config.subtitle;
            header.appendChild(subtitleText);
        }

        if (config.byline) {
            var bylineText = document.createElement('p');
            bylineText.innerText = config.byline;
            header.appendChild(bylineText);
        }

        if (header.innerText.length > 0) {
            header.classList.add(config.theme);
            header.setAttribute('id', 'header');
            story.appendChild(header);
        }

        config.chapters.forEach((record, idx) => {
            var container = document.createElement('div');
            var chapter = document.createElement('div');

            if (record.title) {
                var title = document.createElement('h3');
                title.innerText = record.title;
                chapter.appendChild(title);
            }

            if (record.image) {
                var image = new Image();
                image.src = record.image;
                chapter.appendChild(image);
            }

            if (record.description) {
                var desc = document.createElement('p');
                desc.innerHTML = record.description;
                chapter.appendChild(desc);
            }

            container.setAttribute('id', record.id);
            container.classList.add('step');
            if (idx === 0) container.classList.add('active');

            chapter.classList.add(config.theme);
            container.appendChild(chapter);
            container.classList.add(alignments[record.alignment] || 'centered');
            if (record.hidden) container.classList.add('hidden');
            features.appendChild(container);
        });

        story.appendChild(features);

        var footer = document.createElement('div');

        if (config.footer) {
            var footerText = document.createElement('p');
            footerText.innerHTML = config.footer;
            footer.appendChild(footerText);
        }

        if (footer.innerText.length > 0) {
            footer.classList.add(config.theme);
            footer.setAttribute('id', 'footer');
            story.appendChild(footer);
        }

        var map = new maplibregl.Map({
            container: 'map',
            style: config.style,
            center: config.chapters[0].location.center,
            zoom: config.chapters[0].location.zoom,
            bearing: config.chapters[0].location.bearing,
            pitch: config.chapters[0].location.pitch,
            interactive: false
        });

        if (config.showMarkers) {
            var marker = new maplibregl.Marker({ color: config.markerColor });
            marker.setLngLat(config.chapters[0].location.center).addTo(map);
        }

        var scroller = scrollama();

        map.on('load', function () {
            tuneBasemap();

            // Satellite raster overlay (Esri World Imagery, free for display use)
            map.addSource('satellite', {
                type: 'raster',
                tiles: ['https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}'],
                tileSize: 256,
                attribution: 'Tiles &copy; Esri &mdash; Source: Esri, i-cubed, USDA, USGS, AEX, GeoEye, Getmapping, Aerogrid, IGN, IGP, UPR-EGP, and the GIS User Community'
            });
            // Satellite imagery overlay used in selected chapters
            map.addLayer({
                id: 'satellite-imagery',
                type: 'raster',
                source: 'satellite',
                paint: { 'raster-opacity': 0 }
            });

            // Local GeoJSON street data
            map.addSource('strassen', {
                type: 'geojson',
                data: './data/strassen_berlin_wgs84.geojson'
            });

            map.addLayer({
                id: 'all-streets-overview-case',
                type: 'line',
                source: 'strassen',
                layout: {
                    'line-cap': 'butt',
                    'line-join': 'miter'
                },
                paint: {
                    'line-color': 'rgba(255, 255, 255, 0)',
                    'line-width': [
                        'interpolate', ['linear'], ['zoom'],
                        9, 1.1,
                        10.5, 1.8,
                        12, 2.8,
                        14, 4.4
                    ],
                    'line-opacity': 0
                }
            });

            map.addLayer({
                id: 'all-streets-overview',
                type: 'line',
                source: 'strassen',
                layout: {
                    'line-cap': 'butt',
                    'line-join': 'miter'
                },
                paint: {
                    'line-color': '#ffffff',
                    'line-width': [
                        'interpolate', ['linear'], ['zoom'],
                        9, 1.0,
                        10.5, 1.8,
                        12, 2.8,
                        14, 4.2
                    ],
                    'line-opacity': 0
                }
            });

            // Highlight layers — all start invisible, toggled by chapter enter/exit.
            // Field names from the Berlin GeoJSON: strname (street name), bezname (Bezirk).
            var streetLayers = [
                {
                    id: 'sonnenallee',
                    filter: ['==', ['get', 'strname'], 'Sonnenallee'],
                    color: '#e74c3c'
                },
                {
                    id: 'adlergestell',
                    filter: ['==', ['get', 'strname'], 'Adlergestell'],
                    color: '#e74c3c'
                },
                {
                    id: 'karl-marx-allee',
                    filter: ['==', ['get', 'strname'], 'Karl-Marx-Allee'],
                    color: '#e74c3c'
                },
                {
                    id: 'landsberger-allee',
                    filter: ['==', ['get', 'strname'], 'Landsberger Allee'],
                    color: '#e74c3c'
                },
                {
                    id: 'eiergasse',
                    filter: ['==', ['get', 'strname'], 'Eiergasse'],
                    color: '#f1c40f'
                },
                {
                    // No address count in Berlin WFS — placeholder until address data is available
                    id: 'geister-strassen',
                    filter: ['boolean', false],
                    color: '#95a5a6'
                },
                {
                    // Mohrenstraße was renamed to Anton-Wilhelm-Amo-Straße (OVG ruling 9 July 2025).
                    // WFS data (© 2024) may still use the old name — both are included.
                    id: 'anton-wilhelm-amo-strasse',
                    filter: ['in', ['get', 'strname'], ['literal', ['Anton-Wilhelm-Amo-Straße', 'Mohrenstraße']]],
                    color: '#f39c12'
                },
                {
                    // Afrikanisches Viertel streets with colonial names under active debate
                    id: 'afrikanisches-viertel',
                    filter: ['in', ['get', 'strname'], ['literal', ['Nachtigalplatz', 'Lüderitzstraße', 'Petersallee']]],
                    color: '#8e44ad'
                }
            ];

            streetLayers.forEach(function (l) {
                streetHighlightColors[l.id] = l.color;
                streetGlowLayerIds[l.id] = l.id + '-glow';
            });

            streetLayers.forEach(function (l) {
                map.addLayer({
                    id: streetGlowLayerIds[l.id],
                    type: 'line',
                    source: 'strassen',
                    filter: l.filter,
                    layout: {
                        'line-cap': 'round',
                        'line-join': 'round'
                    },
                    paint: {
                        'line-color': l.color,
                        'line-width': 10,
                        'line-blur': 2,
                        'line-opacity': 0
                    }
                });

                map.addLayer({
                    id: l.id,
                    type: 'line',
                    source: 'strassen',
                    filter: l.filter,
                    layout: {
                        'line-cap': 'round',
                        'line-join': 'round'
                    },
                    paint: {
                        'line-color': '#ffffff',
                        'line-width': 4,
                        'line-opacity': 0
                    }
                });
            });

            if (config.chapters[0].onChapterEnter.length > 0) {
                config.chapters[0].onChapterEnter.forEach(setLayerOpacity);
            }
            if (config.chapters[0].id === 'intro') {
                activateIntroEffects();
            }

            scroller
                .setup({
                    step: '.step',
                    offset: 0.5,
                    progress: true
                })
                .onStepEnter(response => {
                    var current_chapter = config.chapters.findIndex(chap => chap.id === response.element.id);
                    var chapter = config.chapters[current_chapter];

                    response.element.classList.add('active');
                    map[chapter.mapAnimation || 'flyTo'](chapter.location);

                    if (config.showMarkers) marker.setLngLat(chapter.location.center);
                    if (chapter.onChapterEnter.length > 0) chapter.onChapterEnter.forEach(setLayerOpacity);
                    if (chapter.id === 'intro') activateIntroEffects();
                    if (chapter.callback) window[chapter.callback]();
                    if (chapter.rotateAnimation) {
                        map.once('moveend', () => {
                            const rotateNumber = map.getBearing();
                            map.rotateTo(rotateNumber + 180, {
                                duration: 30000,
                                easing: t => t
                            });
                        });
                    }
                    if (config.auto) {
                        var next_chapter = (current_chapter + 1) % config.chapters.length;
                        map.once('moveend', () => {
                            document.querySelectorAll('[data-scrollama-index="' + next_chapter + '"]')[0].scrollIntoView();
                        });
                    }
                })
                .onStepExit(response => {
                    var chapter = config.chapters.find(chap => chap.id === response.element.id);
                    response.element.classList.remove('active');
                    if (chapter.onChapterExit.length > 0) chapter.onChapterExit.forEach(setLayerOpacity);
                    if (chapter.id === 'intro') deactivateIntroEffects();
                });

            if (config.auto) {
                document.querySelectorAll('[data-scrollama-index="0"]')[0].scrollIntoView();
            }
        });
    </script>

</body>

</html>
